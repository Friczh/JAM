name: Build and Sign .crx 

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore private key from secret
        env:
          JAM_PRIVATE_KEY: ${{ secrets.JAM_PRIVATE_KEY }}
        run: |
          if [ -z "$JAM_PRIVATE_KEY" ]; then
            echo "ERROR: JAM_PRIVATE_KEY secret not set."
            exit 1
          fi
          echo "$JAM_PRIVATE_KEY" | base64 --decode > ../jam-key.pem
          chmod 400 ../jam-key.pem

      - name: Debug - Check private key length
        run: |
          wc -l ../jam-key.pem
          head -c 40 ../jam-key.pem
          echo ""
          tail -c 40 ../jam-key.pem

      - name: Remove non-extension files
        run: |
          # Delete repo-only files that must never end up in the .crx.
          # Add new filenames/folders here as needed - keep this list explicit
          # rather than wildcard-deleting, so nothing extension-related is
          # accidentally caught.
          rm -f README.md
          rm -f API_Test.js
          rm -f jam-key.pem.example 2>/dev/null || true
          rm -rf .github
          rm -rf .git
          echo "Remaining files:"
          find . -maxdepth 2

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        id: setup-chrome

      - name: Pack extension as CRX
        run: |
          EXT_PATH=$(pwd)
          KEY_PATH=$(realpath ../jam-key.pem)
          
          "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --pack-extension="$EXT_PATH" \
            --pack-extension-key="$KEY_PATH" \
            --no-sandbox

      - name: Rename output
        run: |
          mv *.crx "JAM-$(date +%Y%m%d-%H%M%S).crx" 2>/dev/null || true
          ls -la *.crx

      - name: Upload CRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: jam-crx
          path: '*.crx'
          retention-days: 30
